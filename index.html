<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excellent Institute - Ultimate MS Excel Masterclass</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Premium EXCEL Green Palette */
            --primary: #107c41; 
            --primary-light: #dcfce7;
            --accent: #22c55e;
            --surface: #ffffff;
            --background: #f8fafc; 
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --radius: 12px;
        }
        
        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            background-color: var(--background);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            letter-spacing: -0.01em;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #bbf7d0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #86efac; }

        /* --- Header --- */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 24px; background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
            z-index: 10; box-shadow: var(--shadow-sm);
        }

        .brand { display: flex; align-items: center; gap: 15px; }

        .toggle-btn {
            background: none; border: none; color: var(--primary); cursor: pointer;
            padding: 6px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; transition: background 0.2s ease;
        }
        .toggle-btn:hover { background-color: var(--primary-light); }

        .brand img.logo {
            width: 45px; height: 45px; border-radius: 50%; object-fit: cover;
            border: 2px solid var(--accent); box-shadow: var(--shadow-sm); cursor: pointer;
        }

        .brand h2 { margin: 0; color: var(--primary); font-size: 1.3rem; font-weight: 700; cursor: pointer; }

        .action-btns button {
            background-color: var(--surface); color: var(--text-main);
            border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px;
            cursor: pointer; font-weight: 600; font-family: inherit; transition: all 0.2s ease;
            box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 8px;
        }
        .action-btns button:hover { background-color: var(--background); border-color: var(--text-muted); transform: translateY(-1px); }

        /* --- Sidebar & Layout --- */
        .main-container { display: flex; flex: 1; overflow: hidden; }

        .sidebar {
            width: 300px; background-color: var(--surface); border-right: 1px solid var(--border);
            padding: 24px 16px; overflow-y: auto; overflow-x: hidden; flex-shrink: 0;
            display: flex; flex-direction: column; gap: 6px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); opacity: 1;
        }
        
        .sidebar.collapsed { width: 0; padding: 24px 0; border-right: none; opacity: 0; }
        
        .nav-label {
            font-size: 0.75rem; text-transform: uppercase; font-weight: 700;
            color: var(--text-muted); margin-bottom: 10px; padding-left: 12px; white-space: nowrap;
        }

        .nav-btn {
            display: flex; align-items: center; width: 100%; padding: 12px 16px;
            border: none; background: none; text-align: left; font-size: 0.95rem;
            font-weight: 600; color: var(--text-muted); cursor: pointer;
            border-radius: var(--radius); transition: all 0.2s ease; white-space: nowrap;
        }
        .nav-btn:hover { background-color: var(--background); color: var(--text-main); }
        .nav-btn.active { background-color: var(--primary-light); color: var(--primary); }

        /* --- Content Area --- */
        .content-area {
            flex: 1; padding: 40px 60px; overflow-y: auto; background-color: transparent; 
            cursor: grab; scroll-behavior: smooth;
        }
        .content-area:active { cursor: grabbing; } 

        .content-wrapper {
            max-width: 1200px; margin: 0 auto; background: var(--surface);
            padding: 40px 50px; border-radius: var(--radius); box-shadow: var(--shadow-md); 
            animation: fadeIn 0.4s ease forwards; position: relative; z-index: 2; transition: max-width 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .note-section { pointer-events: none; }
        .note-section.allow-select { pointer-events: auto; }

        /* --- Typography & Elements --- */
        .note-section h1 { color: var(--text-main); font-size: 2.2rem; font-weight: 800; margin: 0 0 30px 0; border-bottom: 2px solid var(--border); padding-bottom: 15px;}
        .note-section h3 { color: var(--primary); font-size: 1.4rem; margin-top: 40px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .note-section p, .note-section li { line-height: 1.7; font-size: 1.1rem; color: #334155; }

        /* KEYBOARD SHORTCUT STYLING */
        .shortcut-box {
            background-color: var(--primary-light);
            border-left: 4px solid var(--accent);
            padding: 12px 16px;
            margin: 15px 0;
            border-radius: 0 8px 8px 0;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.05rem;
            color: var(--primary);
        }
        
        kbd {
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            border-bottom: 3px solid #94a3b8;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 0.9em;
            font-family: 'Courier New', Courier, monospace;
            color: #1e293b;
            font-weight: 700;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .note-section img {
            max-width: 100%; height: auto; border: 1px solid var(--border);
            border-radius: 8px; margin: 25px 0 10px 0; box-shadow: var(--shadow-sm);
            cursor: zoom-in; pointer-events: auto; transition: transform 0.2s;
        }
        .note-section img:hover { transform: scale(1.01); box-shadow: var(--shadow-md); }
        .img-caption { font-size: 0.9rem; color: var(--text-muted); text-align: center; margin-bottom: 30px; }

        /* --- Dashboard Grid --- */
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-size: 2.5rem; color: var(--text-main); margin-bottom: 10px; }
        .hero p { color: var(--text-muted); font-size: 1.1rem; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; pointer-events: auto; }
        .module-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 24px; cursor: pointer; transition: all 0.3s ease; box-shadow: var(--shadow-sm);
            display: flex; flex-direction: column; align-items: flex-start;
        }
        .module-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); border-color: var(--accent); }
        .card-icon {
            font-size: 2rem; margin-bottom: 15px; background: var(--primary-light);
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 12px;
        }
        .module-card h3 { margin: 0 0 10px 0; color: var(--text-main); font-size: 1.2rem; }
        .module-card span { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }

       /* --- Utilities --- */
        #lightbox {
            display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.9); backdrop-filter: blur(5px);
            overflow: auto; /* Allows scrolling when the image is zoomed */
            text-align: center; /* Centers the image */
            padding: 50px 20px;
        }
        
        #lightbox img { 
            display: inline-block; vertical-align: middle;
            max-width: 90%; max-height: 85vh; border-radius: 8px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            cursor: zoom-in; transition: all 0.3s ease;
            transform-origin: top center;
        }
        
        /* The state when the student clicks to zoom */
        #lightbox img.zoomed {
            max-width: none; 
            max-height: none; 
            width: 200%; /* Makes the image 2x larger */
            cursor: zoom-out; 
            margin-bottom: 50px;
        }

        .watermark-bg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 45vw; max-width: 400px; opacity: 0.04; pointer-events: none; 
            z-index: 9999; border-radius: 50%; object-fit: cover;
        }

        /* --- Responsive & Print --- */
        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; overflow-x: auto; padding: 12px; gap: 10px;}
            .sidebar.collapsed { height: 0; padding: 0; border: none; opacity: 0; }
            .nav-label { display: none; }
            .nav-btn { white-space: nowrap; padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); }
            .content-area { padding: 20px 15px; }
            .content-wrapper { padding: 25px 20px; }
            .watermark-bg { width: 70vw; }
        }

        /* --- Print & PDF Export Styling --- */
        @media print {
            /* 1. Force all scrollable containers to expand fully (Fixes the 1-page cutoff issue) */
            html, body, .main-container, .content-area, .content-wrapper { 
                height: auto !important; 
                overflow: visible !important; 
                position: static !important;
                display: block !important; 
                background-color: transparent !important; 
            }
            
            /* 2. Hide all web UI buttons and menus */
            .sidebar, .header, .action-btns, .dashboard-grid, .hero, .toggle-btn { 
                display: none !important; 
            }
            
            /* 3. Remove web padding and shadows to fit paper sizes */
            .content-area { padding: 0 !important; margin: 0 !important; border: none !important; }
            .content-wrapper { margin: 0 !important; padding: 0 !important; box-shadow: none !important; border: none !important; max-width: 100% !important; }
            .note-section { pointer-events: auto !important; }
            
            /* 4. Force Watermark to stamp on EVERY printed page */
            .watermark-bg { 
                display: block !important; 
                position: fixed !important; 
                top: 50% !important; 
                left: 50% !important; 
                transform: translate(-50%, -50%) !important;
                opacity: 0.08 !important; 
                width: 60vw !important; 
                max-width: 600px !important; 
                z-index: -1 !important;
            }

            /* 5. Smart Page Breaks (Prevents images or text boxes splitting in half) */
            h1 { page-break-before: always; color: #000; padding-top: 20px; }
            h1:first-of-type { page-break-before: avoid; padding-top: 0; } 
            h3 { color: #000; border-bottom: 1px solid #ccc; page-break-after: avoid; }
            img { page-break-inside: avoid; border: none; max-width: 100% !important; margin: 15px 0 !important; }
            p, ul, li, .shortcut-box { page-break-inside: avoid; }
            
            /* 6. High-Contrast mode for the Keyboard Shortcuts */
            .shortcut-box { border: 1px solid #000 !important; background: transparent !important; color: #000 !important; }
            kbd { border: 1px solid #000 !important; box-shadow: none !important; background: transparent !important; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">
            <button id="sidebar-toggle" class="toggle-btn" onclick="toggleSidebar()" title="Hide/Show Menu">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            <img src="YOUR_GITHUB_LOGO_URL.png" alt="Excellent Institute Logo" class="logo" id="mainLogo" onclick="loadDashboard()">
            <h2 onclick="loadDashboard()">Excellent Institute</h2>
        </div>
        <div class="action-btns">
            <button onclick="window.print()">🖨️ Print / PDF</button>
        </div>
    </div>

    <img src="YOUR_GITHUB_LOGO_URL.png" alt="Watermark" class="watermark-bg" id="watermarkLogo">

    <div class="main-container">
        <div class="sidebar" id="main-sidebar">
            <div class="nav-label">Course Chapters</div>
            <button class="nav-btn active" onclick="loadDashboard()" id="home-btn">🏠 Dashboard</button>
            <div id="nav-container" style="display: flex; flex-direction: column; gap: 6px;"></div>
        </div>

        <div class="content-area" id="content-display"></div>
    </div>

    <div id="lightbox" onclick="closeLightbox(event)">
        <img id="lightbox-img" src="" alt="Enlarged view" onclick="toggleZoom(event)">
    </div>

    <!-- Data File -->
    <script src="excel-data.js"></script>
    
    <script>
        const navContainer = document.getElementById('nav-container');
        const contentDisplay = document.getElementById('content-display');
        const sidebar = document.getElementById('main-sidebar');

        function initApp() {
            if (typeof excelBookData === 'undefined') {
                contentDisplay.innerHTML = `<h2 style="color:red; text-align:center; padding:50px;">Awaiting Data File...</h2>`;
                return;
            }
            excelBookData.forEach((chapter, index) => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn note-nav-btn';
                btn.innerHTML = `📗 ${chapter.title.split(':')[0]}`; 
                btn.onclick = () => loadContent(index, btn);
                navContainer.appendChild(btn);
            });
            loadDashboard(); 
        }

        function toggleSidebar() {
            sidebar.classList.toggle('collapsed');
        }

        function loadDashboard() {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('home-btn').classList.add('active');

            let html = `
            <div class="content-wrapper allow-select">
                <div class="hero">
                    <h1>The Ultimate Excel Masterclass</h1>
                    <p>From absolute beginner to data professional.</p>
                    
                    <!-- Application Preview Image -->
                    <img src="images/excel-preview.jpg" alt="Excel Application Preview" style="width: 100%; max-width: 800px; border-radius: 8px; margin: 20px auto 40px auto; box-shadow: var(--shadow-lg); border: 1px solid var(--border); display: block;">
                </div>
                <div class="dashboard-grid">`;
            
            const icons = ['📊', '📈', '📉', '🧮', '🟩', '⚙️', '🔍'];
            if (typeof excelBookData !== 'undefined') {
                excelBookData.forEach((chapter, index) => {
                    let icon = icons[index % icons.length];
                    html += `
                        <div class="module-card" onclick="document.querySelectorAll('.note-nav-btn')[${index}].click()">
                            <div class="card-icon">${icon}</div>
                            <h3>${chapter.title}</h3>
                            <span>${chapter.topics.length} Expert Topics</span>
                        </div>`;
                });
            }

            html += `</div></div>`;
            contentDisplay.innerHTML = html;
            contentDisplay.scrollTop = 0;
        }

        function loadContent(index, clickedBtn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(clickedBtn) clickedBtn.classList.add('active');

            const chapter = excelBookData[index];

            let htmlContent = `
            <div class="content-wrapper">
                <div class="note-section allow-select">
                    <h1>${chapter.title}</h1>`;
            
            chapter.topics.forEach(topic => {
                htmlContent += `<h3>${topic.heading}</h3>`;
                htmlContent += `<p>${topic.text}</p>`;
                
                // NEW: Logic to render the shortcut beautifully if it exists in the data
                if(topic.shortcut) {
                    htmlContent += `
                    <div class="shortcut-box">
                        <strong>⌨️ Shortcut:</strong> <kbd>${topic.shortcut}</kbd>
                    </div>`;
                }

                if(topic.imgSrc) {
                    htmlContent += `<img src="${topic.imgSrc}" alt="${topic.heading}" onclick="openLightbox(this.src)">`;
                    htmlContent += `<div class="img-caption">Figure: ${topic.heading}</div>`;
                }
            });
            htmlContent += `</div></div>`;
            
            contentDisplay.innerHTML = htmlContent;
            contentDisplay.scrollTop = 0;
            
            if(window.innerWidth <= 768) {
                sidebar.classList.add('collapsed');
            }
        }

        // --- 1. NEW ZOOMABLE LIGHTBOX LOGIC ---
        function openLightbox(src) {
            const img = document.getElementById('lightbox-img');
            img.src = src;
            img.classList.remove('zoomed'); // Always start zoomed out
            document.getElementById('lightbox').style.display = 'block'; // Changed to block to allow scrolling
        }

        function closeLightbox(e) {
            // Only close if the student clicks the dark background
            if (e.target.id === 'lightbox') {
                document.getElementById('lightbox').style.display = 'none';
            }
        }

        function toggleZoom(e) {
            e.stopPropagation(); // Prevents the image click from closing the window
            const img = e.target;
            img.classList.toggle('zoomed');
        }

        // --- 2. DRAG TO SCROLL LOGIC (Remains exactly the same!) ---
        let isDown = false, startY, scrollTop;

        contentDisplay.addEventListener('mousedown', (e) => {
            if(e.target.closest('.module-card') || e.target.tagName === 'IMG') return;
            isDown = true;
            startY = e.pageY - contentDisplay.offsetTop;
            scrollTop = contentDisplay.scrollTop;
            let noteSec = contentDisplay.querySelector('.note-section');
            if(noteSec) noteSec.classList.remove('allow-select');
        });

        contentDisplay.addEventListener('mouseleave', () => {
            isDown = false;
            let noteSec = contentDisplay.querySelector('.note-section');
            if(noteSec) noteSec.classList.add('allow-select');
        });

        contentDisplay.addEventListener('mouseup', () => {
            isDown = false;
            let noteSec = contentDisplay.querySelector('.note-section');
            if(noteSec) noteSec.classList.add('allow-select');
        });

        contentDisplay.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const y = e.pageY - contentDisplay.offsetTop;
            const walk = (y - startY) * 2; 
            contentDisplay.scrollTop = scrollTop - walk;
        });

        window.onload = initApp;
    </script>
</body>
</html>
